<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Review Applications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Review Applications</h1>
            <a href="dashboard.html" class="text-blue-600 hover:underline font-medium">
                <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
            </a>
        </div>
        
        <div id="adminAppList" class="space-y-4">
            <div class="text-center py-10 text-gray-500">Loading applications...</div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = "login.html";

        async function loadAllApps() {
            try {
                const res = await fetch('/api/applications/admin/list', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const apps = await res.json();
                const container = document.getElementById('adminAppList');

                if (apps.length === 0) {
                    container.innerHTML = `<div class="bg-white p-8 rounded-xl text-center shadow-sm text-gray-500">No applications found.</div>`;
                    return;
                }

                container.innerHTML = apps.map(app => `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col md:flex-row justify-between items-start md:items-center transition hover:shadow-md">
                        <div class="mb-4 md:mb-0">
                            <h3 class="font-bold text-xl text-blue-600">${app.internshipId ? app.internshipId.title : 'Deleted Position'}</h3>
                            <p class="text-gray-800 mt-1">
                                <i class="fas fa-user-graduate mr-2 text-gray-400"></i>
                                <strong>${app.userId ? app.userId.name : 'Unknown Student'}</strong> 
                            </p>
                            <p class="text-gray-500 text-sm mt-1 mb-2">
                                <i class="fas fa-building mr-2 text-gray-400"></i>
                                ${app.internshipId ? app.internshipId.company : 'N/A'}
                            </p>
                            
                            ${app.resumeLink ? `
                                <a href="${app.resumeLink}" target="_blank" class="inline-flex items-center text-sm font-semibold text-blue-500 hover:text-blue-700 bg-blue-50 px-3 py-1 rounded-lg transition">
                                    <i class="fas fa-file-pdf mr-2"></i> View Student Resume
                                </a>
                            ` : `<span class="text-xs text-red-400 italic">No resume provided</span>`}
                        </div>
                        
                        <div class="flex flex-col items-end space-y-3 w-full md:w-auto">
                            <div class="flex items-center space-x-2">
                                <span class="text-xs font-semibold text-gray-400 uppercase">Status:</span>
                                <select onchange="updateStatus('${app._id}', this.value)" 
                                    class="border border-gray-300 p-2 rounded-lg text-sm bg-white focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                                    <option value="Applied" ${app.status === 'Applied' ? 'selected' : ''}>Applied</option>
                                    <option value="Shortlisted" ${app.status === 'Shortlisted' ? 'selected' : ''}>Shortlisted</option>
                                    <option value="Selected" ${app.status === 'Selected' ? 'selected' : ''}>Selected</option>
                                    <option value="Rejected" ${app.status === 'Rejected' ? 'selected' : ''}>Rejected</option>
                                </select>
                            </div>
                            <p class="text-xs text-gray-400">Applied: ${new Date(app.appliedDate).toLocaleDateString()}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('adminAppList').innerHTML = `<div class="text-red-500">Error loading data.</div>`;
            }
        }

        async function updateStatus(appId, newStatus) {
            const remarks = prompt("Enter any remarks for the student (optional):");
            
            try {
                const res = await fetch(`/api/applications/status/${appId}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status: newStatus, remarks: remarks || "" })
                });

                if (res.ok) {
                    alert("Status updated!");
                    loadAllApps();
                }
            } catch (err) {
                alert("Server error. Is the backend running?");
            }
        }

        loadAllApps();
    </script>
</body>
</html>
