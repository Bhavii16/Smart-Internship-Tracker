<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - SmartTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-sm border-b px-8 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-600"><i class="fas fa-graduation-cap mr-2"></i>StudentPortal</h1>
        <div class="flex items-center space-x-6">
            <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-green-100 text-green-700">Student</span>
            <button onclick="logout()" class="text-gray-600 hover:text-red-500 font-medium">Logout</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">
        <div class="flex space-x-6 mb-8 border-b">
            <button id="postingsTab" onclick="showSection('postings')" class="text-blue-600 border-b-2 border-blue-600 pb-2 font-semibold transition">
                <i class="fas fa-search mr-2"></i>Explore Internships
            </button>
            <button id="appsTab" onclick="showSection('my-apps')" class="text-gray-500 hover:text-blue-600 pb-2 font-semibold transition">
                <i class="fas fa-tasks mr-2"></i>My Applications
            </button>
        </div>

        <div id="displayList" class="space-y-4">
            <p class="text-center text-gray-400 py-10 italic">Finding the best opportunities for you...</p>
        </div>
    </div>

<script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    const userId = localStorage.getItem('userId');

    // Security: Ensure only students are here
    if (!token || role !== 'student') {
        window.location.href = "login.html";
    }

    async function fetchPostings() {
        // Fetch all jobs and current applications to check "Already Applied" status
        const [jobsRes, appsRes] = await Promise.all([
            fetch('/api/internships', { headers: { 'Authorization': `Bearer ${token}` } }),
            fetch('/api/applications/my-applications', { headers: { 'Authorization': `Bearer ${token}` } })
        ]);

        const jobs = await jobsRes.json();
        const myApps = await appsRes.json();
        const appliedIds = new Set(myApps.map(app => app.internshipId ? app.internshipId._id : null));

        const list = document.getElementById('displayList');
        
        if (jobs.length === 0) {
            list.innerHTML = `<div class="text-center py-10 text-gray-500">No internships available right now. Check back later!</div>`;
            return;
        }

        list.innerHTML = jobs.map(job => {
            const hasApplied = appliedIds.has(job._id);

            return `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-start transition hover:shadow-md">
                    <div class="space-y-3">
                        <div>
                            <h3 class="font-bold text-xl text-gray-800">${job.title}</h3>
                            <p class="text-blue-600 font-medium text-sm"><i class="fas fa-building mr-1"></i> ${job.company}</p>
                        </div>
                        <p class="text-gray-600 text-sm leading-relaxed">${job.description || 'View details to learn more about this role.'}</p>
                        <div class="flex items-center text-gray-400 text-xs space-x-4">
                            <span><i class="fas fa-money-bill-wave mr-1"></i> ${job.stipend || 'Competitive'}</span>
                        </div>
                    </div>
                    <div class="ml-4">
                        ${hasApplied 
                            ? `<button class="bg-gray-100 text-gray-400 px-6 py-2 rounded-xl text-sm font-bold cursor-not-allowed border" disabled>Applied</button>`
                            : `<button onclick="applyJob('${job._id}')" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition active:scale-95">Apply</button>`
                        }
                    </div>
                </div>`;
        }).join('');
    }

    async function fetchMyStatus() {
        const res = await fetch('/api/applications/my-applications', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const apps = await res.json();
        const list = document.getElementById('displayList');

        if (apps.length === 0) {
            list.innerHTML = `<div class="text-center py-10 text-gray-500">You haven't applied for any internships yet.</div>`;
            return;
        }

        list.innerHTML = apps.map(app => {
            const colors = { 
                "Applied": "bg-blue-100 text-blue-700", 
                "Selected": "bg-green-100 text-green-700", 
                "Rejected": "bg-red-100 text-red-700", 
                "Shortlisted": "bg-yellow-100 text-yellow-700" 
            };
            const badge = colors[app.status] || "bg-gray-100 text-gray-700";

            return `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-gray-800">${app.internshipId ? app.internshipId.title : 'Position Removed'}</h3>
                        <p class="text-gray-500 text-sm">${app.internshipId ? app.internshipId.company : 'N/A'}</p>
                        <p class="text-[10px] text-gray-400 mt-2 uppercase tracking-widest font-bold">Applied on ${new Date(app.appliedDate).toLocaleDateString()}</p>
                    </div>
                    <div class="text-right">
                        <span class="px-4 py-1 rounded-full text-xs font-black uppercase tracking-tighter ${badge}">
                            ${app.status}
                        </span>
                    </div>
                </div>`;
        }).join('');
    }

    async function applyJob(id) {
        const resume = prompt("Submit your Resume Link (Google Drive/LinkedIn):");
        if (!resume) return;

        const res = await fetch('/api/applications/apply', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ internshipId: id, resumeLink: resume })
        });

        if (res.ok) {
            alert("Application Sent!");
            fetchPostings();
        } else {
            alert("Application failed. You might have already applied.");
        }
    }

    function showSection(type) {
        const pTab = document.getElementById('postingsTab');
        const aTab = document.getElementById('appsTab');
        
        if (type === 'postings') {
            pTab.className = "text-blue-600 border-b-2 border-blue-600 pb-2 font-semibold transition";
            aTab.className = "text-gray-500 hover:text-blue-600 pb-2 font-semibold transition";
            fetchPostings();
        } else {
            aTab.className = "text-blue-600 border-b-2 border-blue-600 pb-2 font-semibold transition";
            pTab.className = "text-gray-500 hover:text-blue-600 pb-2 font-semibold transition";
            fetchMyStatus();
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    // Default Load
    fetchPostings();
</script>
</body>
</html>
