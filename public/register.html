<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Smart Internship Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div class="bg-green-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-user-plus text-green-600 text-2xl"></i>
            </div>
            <h2 class="text-3xl font-bold text-gray-800">Create Account</h2>
            <p class="text-gray-500 mt-2">Join the Smart Internship Tracker</p>
        </div>

        <form id="registerForm" class="space-y-4" autocomplete="off">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" 
                    class="w-full p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-green-500 transition" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" 
                    class="w-full p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-green-500 transition" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" autocomplete="new-password" 
                    class="w-full p-3 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-green-500 transition" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Register As</label>
                <select id="role" class="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-green-500 transition cursor-pointer">
                    <option value="student">Student / Applicant</option>
                    <option value="recruiter">Recruiter</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-green-700 shadow-lg shadow-green-200 transition-all active:scale-95 mt-4">
                Create Account
            </button>
        </form>

        <div class="mt-8 text-center border-t pt-6">
            <p class="text-gray-600">Already have an account? 
                <a href="login.html" class="text-blue-600 font-semibold hover:underline">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role }) // Added role here
                });

                const data = await res.json();

                if (res.ok) {
                    alert("Registration successful! Redirecting to login...");
                    window.location.href = "login.html";
                } else {
                    alert(data.message || "Registration failed. Try a different email.");
                }
            } catch (err) {
                alert("Server error. Make sure your backend is running.");
            }
        });
    </script>
</body>
</html>
